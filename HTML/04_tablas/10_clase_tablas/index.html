<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablas</title>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Laptop</td>
          <td>2</td>
          <td>$45USD</td>
        </tr>
        <tr>
          <td>Mouse</td>
          <td>5</td>
          <td>$12USD</td>
        </tr>
        <tr>
          <td>Teclado</td>
          <td>3</td>
          <td>$10USD</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="2">Total:</th>
          <th>$67USD</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
