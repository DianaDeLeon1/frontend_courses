<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listas y enlaces</title>
  </head>
  <body>
    <!--Listas desordenadas-->
    <p>Lista del super:</p>
    <ul>
      <li>Leche</li>
      <li>Pan</li>
      <li>Verduras</li>
    </ul>
    <!--Lista ordenada-->
    <p>Instrucciones para preparar café:</p>
    <ol>
      <!--<oltype= "I":type= "i": type= "A": type= "a"> -->
      <li>Hervir agua</li>
      <li>Agregar café</li>
      <li>Servir en taza</li>
    </ol>
    <!--Si colocas algo entre la lista, como un texto o imagen y quieres continuar con la numeración de la lista, coloca: <ol start="4"> -->
    <a href="https://platzi.com" target="_blank">Platzi</a>
    <!--Enlace en página nueva-->
    <a href="mailto:info@ejemplo.com?subject=Consulta&body=Hola"
      >Enviar email</a
    >
    <a href="tel:+3412345678">Llamar: +34 123 456 78</a>
  </body>
</html>
