<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesibilidad</title>
</head>
<body>
    <!--Boton con icono sin texto-->
    <button aria-label="cerrar ventana">x</button>

    <!-- Navegacin sin titulo visible-->
     <header>
        <nav aria-label="Menú principal">
            <a href="#inicio">Inicio</a>
            <a href="#productos">Productos</a>
        </nav>
     </header>

     <!--Input cualdo el label no es suficiente-->
     <input type="search" aria-label="Buscador de productos">

     <!--Campo de instrucciones-->
     <label for="password">Contraseña: </label>
     <input type="password" name="password" id="password" aria-describedby="password-help">
     <small id="password-help">Mínimo 8 caracteres incluido números y letras</small>
     
     <!--Imagen compleja con descripcion-->
     <img src="grafico.jpg" alt="ventas 2026" aria-describedby="grafica-description">
     <p id="grafica-description">Las ventas aumentaron un 40% en el Q1</p>
     
     <!--Region principal-->
     <div role="main">
        <h3>Contenido principal de la seccion</h3>
        <p>Aquí va el contenido más importante de esta sección</p>
     </div>

     <!--Alertas importante-->
     <div role="alert">Tu sesión expira en 5 minutos</div>
</body>
</html>
