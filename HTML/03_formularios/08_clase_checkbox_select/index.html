<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Más inputs</title>
  </head>
  <body>
    <form action="#" method="post">
      <div>
        <label for="password">Contraseña: </label>
        <input type="password" name="password" id="password" />
      </div>
      <div>
        <label for="age">Edad: </label>
        <input type="number" name="age" id="age" min="18" max="70" />
      </div>
      <div>
        <label for="date">Fecha: </label>
        <input type="date" name="date" id="date" />
      </div>
      <div>
        <label for="color">Color: </label>
        <input type="color" name="color" id="color" />
      </div>
      <fieldset>
        <legend>Género</legend>
        <input type="radio" name="genero" id="masculino" value="M" />
        <label for="masculino">Masculino</label>
        <input type="radio" name="genero" id="femenino" value="F" />
        <label for="femenino">Femenino</label>
      </fieldset>
      <fieldset>
        <legend>Intereses:</legend>
        <input type="checkbox" name="intereses" id="sports" value="sports" />
        <label for="sports">Deportes</label>

        <input type="checkbox" name="intereses" id="music" value="music" />
        <label for="music">Música</label>
      </fieldset>
      <div>
        <label for="country">País</label>
        <select name="country" id="country">
          <option value="Mexico">México</option>
          <option value="Colombia">Colombia</option>
          <option value="Argentina">Argentina</option>
        </select>
      </div>
    </form>
  </body>
</html>
