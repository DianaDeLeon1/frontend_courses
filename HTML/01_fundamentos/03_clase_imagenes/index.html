<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagenes</title>
  </head>
  <body>
    <img
      src="IMG/paisaje-original.jpg"
      alt="Paisaje de montaña"
      width="200"
      height="150"
    />
    <img
      src="IMG/montanas_original.jpg"
      alt="paisaje montañosos"
      width="200"
      height="150"
    />
    <figure>
      <img
        src="IMG/nevado.jpg"
        alt="Montañas nevadas"
        width="200"
        height="150"
      />
      <figcaption>Vista de montaña nevada</figcaption>
      <!--Texto debajo de la imagen, que no depende de alt, se visualiza-->
    </figure>
  </body>
</html>
